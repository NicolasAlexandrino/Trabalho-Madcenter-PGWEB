<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Madcenter Entregas</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="shortcut icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    html, body {
      min-height: 100vh;
      margin: 0;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f7f5;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
    }
    [data-theme="dark"] body {
      background: #111816;
    }

    /* ── Botão de tema no canto ── */
    .login-theme-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border: 1.5px solid var(--line);
      border-radius: 50%;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, border-color .15s;
      z-index: 10;
    }
    .login-theme-btn:hover { background: var(--surface-soft); }

    /* ── Card ── */
    .login-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 2.75rem 2.25rem 2.25rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 40px rgba(0, 92, 46, .13);
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
      margin: 1rem;
    }
    [data-theme="dark"] .login-card {
      background: #17211d;
      box-shadow: 0 8px 40px rgba(0, 0, 0, .45);
    }

    /* ── Logo + títulos ── */
    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      text-align: center;
    }
    .login-logo img {
      height: 72px;
      object-fit: contain;
    }
    .login-logo h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      color: #005c2e;
      line-height: 1.2;
    }
    [data-theme="dark"] .login-logo h1 { color: #0fa958; }
    .login-logo p {
      margin: 0;
      font-size: .875rem;
      color: #6b7280;
    }
    [data-theme="dark"] .login-logo p { color: #a7b7ad; }

    /* ── Campos ── */
    .login-fields {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .login-field {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }
    .login-field label {
      font-size: .875rem;
      font-weight: 600;
      color: #1f2933;
    }
    [data-theme="dark"] .login-field label { color: #edf6f1; }
    .login-field input {
      height: 48px;
      padding: 0 1rem;
      border: 1.5px solid #dce6df;
      border-radius: 12px;
      font-size: 1rem;
      background: #f9fafb;
      color: #1f2933;
      transition: border-color .15s, background .15s;
    }
    [data-theme="dark"] .login-field input {
      background: #203229;
      border-color: #2e4639;
      color: #edf6f1;
    }
    .login-field input:focus {
      outline: none;
      border-color: #005c2e;
      background: #ffffff;
    }
    [data-theme="dark"] .login-field input:focus {
      border-color: #0fa958;
      background: #17211d;
    }

    /* ── Erro ── */
    .login-error {
      color: #d93025;
      font-size: .875rem;
      text-align: center;
      display: none;
      padding: .5rem .75rem;
      background: #fef2f2;
      border-radius: 8px;
      border: 1px solid #fecaca;
    }
    [data-theme="dark"] .login-error {
      background: rgba(217, 48, 37, .12);
      border-color: rgba(217, 48, 37, .3);
    }

    /* ── Botão Entrar ── */
    .login-btn {
      height: 48px;
      width: 100%;
      background: #005c2e;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }
    .login-btn:hover:not(:disabled) { background: #004422; }
    [data-theme="dark"] .login-btn { background: #0fa958; }
    [data-theme="dark"] .login-btn:hover:not(:disabled) { background: #19bd68; }
    .login-btn:disabled { opacity: .65; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- Botão de tema no canto superior direito -->
  <button class="login-theme-btn" id="themeToggle" aria-label="Alternar tema">
    <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <div class="login-card">

    <!-- Logo + Títulos -->
    <div class="login-logo">
      <img src="assets/logo_madcenter.svg" alt="Madcenter"
           onerror="this.style.display='none'">
      <h1>Madcenter Entregas</h1>
      <p>Sistema de gestão operacional</p>
    </div>

    <!-- Formulário -->
    <form id="loginForm" autocomplete="on" novalidate>
      <div class="login-fields">
        <div class="login-field">
          <label for="nomeInput">Nome de usuário</label>
          <input id="nomeInput" type="text" placeholder="Seu nome completo"
                 autocomplete="username" required>
        </div>
        <div class="login-field">
          <label for="senhaInput">Senha</label>
          <input id="senhaInput" type="password" placeholder="••••••••"
                 autocomplete="current-password" required>
        </div>
      </div>

      <div id="loginError" class="login-error" style="margin-top:.75rem"></div>

      <button class="login-btn" type="submit" id="loginBtn" style="margin-top:1.25rem">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Entrar
      </button>
    </form>

  </div>

  <script>
    "use strict";
    const API_BASE = window.location.port === "3000" ? "" : "http://localhost:3000";

    // ── Tema ──────────────────────────────────────────────────────────────────
    const TEMA_KEY = "madcenter_tema";
    const sunIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
    const moonIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

    function aplicarTema(tema) {
      document.documentElement.setAttribute("data-theme", tema);
      document.getElementById("themeIcon").parentElement.innerHTML =
        tema === "dark" ? sunIcon : moonIcon;
    }

    // Login.html usa tema claro por padrão, mas respeita a escolha salva
    const temaAtual = localStorage.getItem(TEMA_KEY) || "light";
    aplicarTema(temaAtual);

    document.getElementById("themeToggle").addEventListener("click", () => {
      const novo = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
      localStorage.setItem(TEMA_KEY, novo);
      aplicarTema(novo);
    });

    // ── Redireciona se já está logado ─────────────────────────────────────────
    const token  = sessionStorage.getItem("madcenter_token");
    const perfil = sessionStorage.getItem("madcenter_perfil");
    if (token && perfil) {
      const dest = { admin: "index.html", atendente: "atendente.html", motorista: "motorista.html" }[perfil];
      if (dest) window.location.replace(dest);
    }

    // ── Submit ────────────────────────────────────────────────────────────────
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const nome  = document.getElementById("nomeInput").value.trim();
      const senha = document.getElementById("senhaInput").value;
      const erro  = document.getElementById("loginError");
      const btn   = document.getElementById("loginBtn");

      if (!nome || !senha) {
        erro.textContent = "Preencha o nome de usuário e a senha.";
        erro.style.display = "block";
        return;
      }

      erro.style.display = "none";
      btn.disabled = true;
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Entrando…`;

      try {
        const res  = await fetch(`${API_BASE}/api/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nome, senha })
        });
        const json = await res.json();

        if (!res.ok) {
          erro.textContent = json.error || "Usuário ou senha incorretos.";
          erro.style.display = "block";
          document.getElementById("senhaInput").value = "";
          document.getElementById("senhaInput").focus();
          return;
        }

        sessionStorage.setItem("madcenter_token",  json.token);
        sessionStorage.setItem("madcenter_nome",   json.nome);
        sessionStorage.setItem("madcenter_perfil", json.perfil);

        const destino = { admin: "index.html", atendente: "atendente.html", motorista: "motorista.html" }[json.perfil];
        if (destino) {
          window.location.replace(destino);
        } else {
          erro.textContent = `Perfil desconhecido: ${json.perfil}`;
          erro.style.display = "block";
        }
      } catch {
        erro.textContent = "Erro ao conectar ao servidor. Tente novamente.";
        erro.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Entrar`;
      }
    });
  </script>
</body>
</html>
